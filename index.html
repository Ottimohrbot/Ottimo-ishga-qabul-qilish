<style>
* { margin:0; padding:0; box-sizing:border-box; }
.wrap { background: linear-gradient(135deg,#f0faf4 0%,#fff 50%,#fff5f5 100%); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); overflow: hidden; min-height: 500px; }
.topbar { background: #1B4D2E; display: flex; align-items: center; gap: 12px; padding: 14px 20px; }
.tlogo { width: 38px; height: 38px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: #1B4D2E; }
.tinfo { flex: 1; }
.ttitle { font-size: 15px; font-weight: 500; color: #fff; }
.tsub { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 1px; }
.tstatus { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,0.7); }
.sdot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; }
.main { padding: 20px; }
.chat-box { background: #fff; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); min-height: 300px; max-height: 380px; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
.msg { display: flex; gap: 8px; align-items: flex-start; }
.msg.user { flex-direction: row-reverse; }
.av { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; }
.av.bot { background: #1B4D2E; color: #fff; }
.av.user { background: #D62828; color: #fff; }
.bub { max-width: 78%; padding: 9px 13px; border-radius: var(--border-radius-lg); font-size: 14px; line-height: 1.6; color: var(--color-text-primary); }
.bub.bot { background: #f0faf4; border: 0.5px solid #b6e8c8; border-top-left-radius: 4px; }
.bub.user { background: #D62828; color: #fff; border-top-right-radius: 4px; }
.typing { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: #1B4D2E; animation: bl 1.2s infinite; }
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,80%,100%{opacity:.2}40%{opacity:1}}
.input-row { display: flex; gap: 8px; margin-bottom: 10px; }
.input-row input { flex: 1; font-size: 14px; border-radius: var(--border-radius-md); }
.send-btn { padding: 0 16px; background: #1B4D2E; color: #fff; border: none; border-radius: var(--border-radius-md); cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; }
.quick-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.qbtn { font-size: 12px; padding: 5px 12px; border-radius: var(--border-radius-md); border: 0.5px solid #1B4D2E; background: #fff; color: #1B4D2E; cursor: pointer; }
.choice-panel { display: none; flex-direction: row; gap: 12px; margin-bottom: 12px; }
.choice-card { flex: 1; border-radius: var(--border-radius-lg); border: 1.5px solid var(--color-border-tertiary); background: #fff; padding: 18px 16px; cursor: pointer; text-align: center; transition: border-color .15s; }
.choice-card:hover { border-color: #1B4D2E; background: #f0faf4; }
.ci { font-size: 24px; margin-bottom: 8px; }
.ct { font-size: 14px; font-weight: 500; color: #1B4D2E; margin-bottom: 4px; }
.cd { font-size: 12px; color: var(--color-text-secondary); line-height: 1.4; }
.choice-card.red-card:hover { border-color: #D62828; background: #fff5f5; }
.choice-card.red-card .ct { color: #D62828; }
.learn-panel { display: none; }
.learn-title { font-size: 15px; font-weight: 500; color: #1B4D2E; margin-bottom: 12px; }
.rules-box { background: #f0faf4; border: 0.5px solid #b6e8c8; border-radius: var(--border-radius-lg); padding: 14px 16px; margin-bottom: 12px; }
.rules-box h3 { font-size: 12px; font-weight: 500; color: #1B4D2E; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.rule-item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; font-size: 13px; }
.rnum { width: 20px; height: 20px; border-radius: 50%; background: #1B4D2E; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; margin-top: 1px; }
.vtitle { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.vcards { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.vcard { display: flex; align-items: center; gap: 12px; background: #fff; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 14px; cursor: pointer; text-decoration: none; }
.vcard:hover { background: #f0faf4; }
.vthumb { width: 44px; height: 32px; border-radius: 4px; background: #D62828; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.vthumb i { color: #fff; font-size: 16px; }
.vname { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.vdur { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.test-panel { display: none; }
.pbar { height: 4px; background: var(--color-border-tertiary); border-radius: 2px; margin-bottom: 14px; overflow: hidden; }
.pfill { height: 100%; background: #1B4D2E; transition: width .3s; }
.qcard { background: #fff; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 16px; margin-bottom: 10px; }
.qnum { font-size: 11px; color: var(--color-text-secondary); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.qtxt { font-size: 15px; font-weight: 500; line-height: 1.5; margin-bottom: 14px; }
.opts { display: flex; flex-direction: column; gap: 7px; }
.opt { text-align: left; padding: 9px 13px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: #fff; cursor: pointer; }
.opt:hover { background: #f0faf4; }
.opt.ok { background: #e6f4ea; border-color: #1B4D2E; color: #1B4D2E; }
.opt.no { background: #fce8e6; border-color: #D62828; color: #D62828; }
.res-card { background: #fff; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 16px; margin-top: 10px; display: none; }
.res-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.res-ttl { font-size: 14px; font-weight: 500; }
.badge { font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: var(--border-radius-md); }
.badge.ok { background: #e6f4ea; color: #1B4D2E; }
.badge.mid { background: #fff8e1; color: #8a6500; }
.badge.no { background: #fce8e6; color: #D62828; }
.rrow { display: flex; justify-content: space-between; font-size: 13px; padding: 7px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.rrow:last-child{border:none}
.rk{color:var(--color-text-secondary)}
.rv{font-weight:500}
.back-btn { font-size: 13px; color: var(--color-text-secondary); background: none; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 7px 14px; cursor: pointer; margin-top: 10px; }
.restart-btn { width: 100%; margin-top: 12px; padding: 10px; background: #1B4D2E; color: #fff; border: none; border-radius: var(--border-radius-md); cursor: pointer; font-size: 14px; }
.test-setup { background: #fff; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 16px; margin-bottom: 10px; }
.test-setup label { font-size: 12px; color: var(--color-text-secondary); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
.test-setup select { width: 100%; margin-bottom: 12px; font-size: 14px; }
.start-btn { width: 100%; padding: 11px; background: #D62828; color: #fff; border: none; border-radius: var(--border-radius-md); cursor: pointer; font-size: 14px; font-weight: 500; }
</style>

<div class="wrap">
  <div class="topbar">
    <div class="tlogo">OT</div>
    <div class="tinfo">
      <div class="ttitle">Ottimo HR Agent</div>
      <div class="tsub">Ishga qabul · AI yordamchi</div>
    </div>
    <div class="tstatus"><div class="sdot"></div> Faol</div>
  </div>
  <div class="main">
    <div class="chat-box" id="chatBox"></div>
    <div class="choice-panel" id="choicePanel">
      <div class="choice-card" onclick="goLearn()">
        <div class="ci"><i class="ti ti-book" aria-hidden="true"></i></div>
        <div class="ct">Lavozimni takomillashtirish</div>
        <div class="cd">Qoidalar va o'quv videolar</div>
      </div>
      <div class="choice-card red-card" onclick="goTest()">
        <div class="ci"><i class="ti ti-certificate" aria-hidden="true"></i></div>
        <div class="ct">Bilim testi</div>
        <div class="cd">Professional savollar bilan o'zingizni sinang</div>
      </div>
    </div>
    <div class="quick-row" id="quickRow">
      <button class="qbtn" onclick="qs('Barista')">Barista</button>
      <button class="qbtn" onclick="qs('Ofitsiant')">Ofitsiant</button>
      <button class="qbtn" onclick="qs('Kassir')">Kassir</button>
      <button class="qbtn" onclick="qs('HR')">HR</button>
      <button class="qbtn" onclick="qs('Menejer')">Menejer</button>
    </div>
    <div class="input-row" id="inputRow">
      <input type="text" id="uInput" placeholder="Javobingizni yozing..." onkeydown="if(event.key==='Enter')send()" />
      <button class="send-btn" onclick="send()"><i class="ti ti-send" aria-hidden="true"></i> Yuborish</button>
    </div>
    <div class="learn-panel" id="learnPanel">
      <div class="learn-title" id="learnTitle"></div>
      <div class="rules-box"><h3>Asosiy qoidalar</h3><div id="rulesList"></div></div>
      <div class="vtitle">O'quv videolar</div>
      <div class="vcards" id="videoList"></div>
      <button class="back-btn" onclick="backToChat()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Orqaga</button>
    </div>
    <div class="test-panel" id="testPanel">
      <div class="test-setup" id="testSetup">
        <label>Daraja</label>
        <select id="daraja">
          <option value="boshlangich">Boshlangich</option>
          <option value="orta">O'rta</option>
          <option value="professional">Professional</option>
        </select>
        <button class="start-btn" onclick="startTest()">Testni boshlash</button>
      </div>
      <div id="testArea" style="display:none">
        <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
        <div class="qcard" id="qcard">
          <div class="qnum" id="qnum"></div>
          <div class="qtxt" id="qtxt"></div>
          <div class="opts" id="qopts"></div>
        </div>
        <div class="res-card" id="testRes">
          <div class="res-head"><div class="res-ttl">Test natijasi</div><div class="badge" id="resBadge"></div></div>
          <div id="resRows"></div>
          <button class="restart-btn" onclick="resetTest()">Qaytadan boshlash</button>
          <button class="restart-btn" id="improveBtn" style="display:none;margin-top:8px;background:#D62828;" onclick="goLearn()">📚 Lavozimingizni qayta mukammalashtiring</button>
        </div>
      </div>
      <button class="back-btn" onclick="backToChat()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Orqaga</button>
    </div>
  </div>
</div>

<script>
let hist=[], busy=false, curLav="barista";
let step=0;
const steps=['lavozim','ism','tajriba','motivatsiya','grafik'];

const RULES={
  barista:["Espresso harorati 90–96°C bo'lishi shart","Cappuccino tayyorlashda sut ko'pigi silliq bo'lsin","Barcha jihozlar har kuni tozalansin","Mijozga doim tabassum va salom bilan munosabat qiling","Buyurtma 3 daqiqa ichida bajarilsin"],
  ofitsiant:["Mijozni kirishida 30 soniya ichida kutib oling","Menyu haqida to'liq bilimga ega bo'ling","Buyurtmani aniq yozib oling","Stol har doim toza va tartibli bo'lsin","Mijoz chiqishida minnatdorchilik bildiring"],
  kassir:["Har bir to'lovni ikki marta tekshiring","Qaytimni aniq bering va ovoz chiqarib ayting","Kassa kunlik yopilishida balanslansin","Mijozga chek albatta berilsin","Navbatni tez va silliq boshqaring"],
  hr:["Xodim ma'lumotlarini maxfiy saqlang","Intervyuni belgilangan vaqtda o'tkazing","Har bir ariza qabul qilinganligi haqida xabardor qiling","Korporativ qoidalar va mehnat qonunchiligini yaxshi biling","Xodimlar uchun onboarding jarayonini to'liq o'tkazing"],
  menejer:["Jamoani har kuni brifing bilan boshlang","KPI ko'rsatkichlarini haftalik kuzating","Xodimlar muammolarini 24 soat ichida hal qiling","Mijoz shikoyatlarini shaxsan ko'rib chiqing","Hisobotlarni belgilangan muddat ichida topshiring"]
};
const VIDEOS={
  barista:[{n:"Espresso tayyorlash asoslari",d:"8:24",u:"https://www.youtube.com/results?search_query=espresso+basics"},{n:"Latte Art boshlang'ich dars",d:"12:10",u:"https://www.youtube.com/results?search_query=latte+art+beginner"},{n:"Qahva donlarini tanlash",d:"6:45",u:"https://www.youtube.com/results?search_query=coffee+beans+selection"}],
  ofitsiant:[{n:"Professional xizmat ko'rsatish",d:"10:30",u:"https://www.youtube.com/results?search_query=professional+waiter+service"},{n:"Menyu taqdimoti usullari",d:"7:15",u:"https://www.youtube.com/results?search_query=menu+presentation+restaurant"},{n:"Mijoz bilan muloqot",d:"9:00",u:"https://www.youtube.com/results?search_query=customer+communication+tips"}],
  kassir:[{n:"Kassa apparati bilan ishlash",d:"5:50",u:"https://www.youtube.com/results?search_query=cash+register+training"},{n:"Tez va to'g'ri hisob-kitob",d:"8:00",u:"https://www.youtube.com/results?search_query=cashier+skills+training"},{n:"Xizmat sifati va tezligi",d:"6:20",u:"https://www.youtube.com/results?search_query=cashier+customer+service"}],
  hr:[{n:"HR menejment asoslari",d:"10:15",u:"https://www.youtube.com/results?search_query=hr+management+basics"},{n:"Intervyu o'tkazish texnikasi",d:"8:30",u:"https://www.youtube.com/results?search_query=interview+techniques+hr"},{n:"Korporativ madaniyat yaratish",d:"12:00",u:"https://www.youtube.com/results?search_query=corporate+culture+building"}],
  menejer:[{n:"Jamoa boshqaruvi asoslari",d:"11:20",u:"https://www.youtube.com/results?search_query=team+management+basics"},{n:"KPI va maqsad belgilash",d:"9:45",u:"https://www.youtube.com/results?search_query=kpi+goal+setting+management"},{n:"Yetakchilik ko'nikmalari",d:"13:10",u:"https://www.youtube.com/results?search_query=leadership+skills+manager"}]
};
const LNAMES={barista:"Barista",ofitsiant:"Ofitsiant",kassir:"Kassir",hr:"HR",menejer:"Menejer"};

const QSCRIPT=[
  {q:"Assalomu alaykum! Ottimo Cafega xush kelibsiz! 🌿\n\nQaysi lavozimga murojaat qilmoqchisiz?\n👇 Pastdagi tugmalardan birini tanlang yoki yozing.", key:"lavozim"},
  {q:"Ismingiz va familiyangiz nima?", key:"ism"},
  {q:"Ajoyib! Oldindan ushbu sohadagi tajribangiz bormi? Qancha yil va qayerda ishlagan edingiz?", key:"tajriba"},
  {q:"Nima uchun aynan Ottimo Cafeda ishlashni xohlaysiz?", key:"motivatsiya"},
  {q:"Ish grafiging qanday — to'liq kunmi yoki yarim kunmi? Qaysi kunlar qulay?", key:"grafik"}
];

const data={};

function addMsg(role,text){
  const b=document.getElementById('chatBox');
  const d=document.createElement('div');
  d.className='msg '+role;
  d.innerHTML=`<div class="av ${role}">${role==='bot'?'OT':'SZ'}</div><div class="bub ${role}">${text.replace(/\n/g,'<br>')}</div>`;
  b.appendChild(d); b.scrollTop=b.scrollHeight;
}

function botMsg(text){ addMsg('bot',text); }
function userMsg(text){ addMsg('user',text); }

function send(){
  const inp=document.getElementById('uInput');
  const t=inp.value.trim();
  if(!t||busy)return;
  inp.value='';
  processInput(t);
}
function qs(t){ processInput(t); }

function processInput(t){
  document.getElementById('quickRow').style.display='none';
  userMsg(t);
  busy=true;
  setTimeout(()=>{ handleStep(t); busy=false; }, 600);
}

function detectLav(t){
  const tl=t.toLowerCase();
  if(tl.includes('barista')) return 'barista';
  if(tl.includes('ofits')) return 'ofitsiant';
  if(tl.includes('kassir')) return 'kassir';
  if(tl.includes('hr') || tl.includes('h.r')) return 'hr';
  if(tl.includes('menejer') || tl.includes('manager')) return 'menejer';
  return null;
}

function handleStep(t){
  if(step===0){
    const lav=detectLav(t);
    if(!lav){
      botMsg("Kechirasiz, lavozimni aniqlay olmadim. Iltimos quyidagilardan birini tanlang:");
      document.getElementById('quickRow').style.display='flex';
      return;
    }
    curLav=lav;
    data.lavozim=LNAMES[lav];
    step=1;
    setTimeout(()=>botMsg(QSCRIPT[1].q),400);
  } else if(step===1){
    data.ism=t;
    step=2;
    setTimeout(()=>botMsg(QSCRIPT[2].q),400);
  } else if(step===2){
    data.tajriba=t;
    step=3;
    setTimeout(()=>botMsg(QSCRIPT[3].q),400);
  } else if(step===3){
    data.motivatsiya=t;
    step=4;
    setTimeout(()=>botMsg(QSCRIPT[4].q),400);
  } else if(step===4){
    data.grafik=t;
    step=5;
    setTimeout(()=>finishInterview(),600);
  }
}

function finishInterview(){
  const score=calcScore();
  const status=score>=70?'QABUL':score>=50?'SHARTLI':'RAD ETISH';
  botMsg(`Rahmat, ${data.ism}! Suhbatimiz yakunlandi. ✅\n\nSiz ${data.lavozim} lavozimi uchun ariza berdingiz.\nDastlabki baholash: ${status}\n\nEndi o'zingiz uchun kerakli yo'nalishni tanlang:`);
  document.getElementById('inputRow').style.display='none';
  showChoice();
}

function calcScore(){
  let s=60;
  if(data.tajriba && data.tajriba.length>10) s+=20;
  if(data.motivatsiya && data.motivatsiya.length>15) s+=20;
  return Math.min(s,100);
}

function showChoice(){
  document.getElementById('choicePanel').style.display='flex';
}
function backToChat(){
  document.getElementById('chatBox').style.display='flex';
  document.getElementById('learnPanel').style.display='none';
  document.getElementById('testPanel').style.display='none';
  document.getElementById('choicePanel').style.display='flex';
}
function goLearn(){
  document.getElementById('choicePanel').style.display='none';
  document.getElementById('chatBox').style.display='none';
  const lav=curLav in RULES?curLav:'barista';
  document.getElementById('learnTitle').textContent=LNAMES[lav]+' — Takomillashtirish';
  document.getElementById('rulesList').innerHTML=RULES[lav].map((r,i)=>`<div class="rule-item"><div class="rnum">${i+1}</div><span>${r}</span></div>`).join('');
  document.getElementById('videoList').innerHTML=VIDEOS[lav].map(v=>`<a class="vcard" href="${v.u}" target="_blank" rel="noopener"><div class="vthumb"><i class="ti ti-player-play" aria-hidden="true"></i></div><div style="flex:1"><div class="vname">${v.n}</div><div class="vdur">${v.d}</div></div><i class="ti ti-external-link" aria-hidden="true" style="color:var(--color-text-secondary)"></i></a>`).join('');
  document.getElementById('learnPanel').style.display='block';
}
function goTest(){
  document.getElementById('choicePanel').style.display='none';
  document.getElementById('chatBox').style.display='none';
  document.getElementById('testPanel').style.display='block';
}

const TESTS={
  barista:{
    boshlangich:[
      {s:"Espresso tayyorlashda suv harorati qancha bo'lishi kerak?",v:["A) 60–70°C","B) 90–96°C","C) 100°C","D) 75–80°C"],t:"B"},
      {s:"Cappuccino tarkibida nima bo'ladi?",v:["A) Faqat espresso","B) Espresso va suv","C) Espresso, bug'langan sut va ko'pik","D) Espresso va krema"],t:"C"},
      {s:"Qahva jihozlari qachon tozalanadi?",v:["A) Hafta oxirida","B) Oyda bir marta","C) Har kuni smena oxirida","D) Faqat menejor ko'rsa"],t:"C"},
      {s:"Arabica qahvasi qanday xususiyatga ega?",v:["A) Juda achchiq","B) Yumshoq va xushbo'y","C) Tatvsiz","D) Robustadan kuchsiz"],t:"B"},
      {s:"Mijoz noto'g'ri buyurtma olsa nima qilasiz?",v:["A) E'tibor bermayman","B) Menejerga aytaman","C) Kechirim so'rab darhol almashtiraman","D) Mijoz aybdor deb aytaman"],t:"C"}
    ],
    orta:[
      {s:"Espresso extraction vaqti qancha bo'lishi ideal?",v:["A) 5–10 soniya","B) 25–30 soniya","C) 60 soniya","D) 2 daqiqa"],t:"B"},
      {s:"Latte va cappuccino farqi nima?",v:["A) Farq yo'q","B) Latte ko'proq sut, cappuccino ko'proq ko'pik","C) Cappuccino ko'proq sut","D) Latte espressosiz tayyorlanadi"],t:"B"},
      {s:"Grinder sozlamasi qachon o'zgartiriladi?",v:["A) Hech qachon","B) Faqat kafedan so'rov bo'lsa","C) Ob-havo va nam o'zgarganda","D) Har oyda bir marta"],t:"C"},
      {s:"Sut ko'pigining ideal harorati qancha?",v:["A) 40–45°C","B) 60–65°C","C) 80–85°C","D) 100°C"],t:"B"},
      {s:"Ristretto va espresso farqi nima?",v:["A) Farq yo'q","B) Ristretto kamroq suv va kuchliroq ta'm","C) Ristretto kuchsizroq","D) Ristretto sutli"],t:"B"}
    ],

function getQuestions(lav,dar){
  if(TESTS[lav]&&TESTS[lav][dar]) return TESTS[lav][dar];
  return [
    {s:`${LNAMES[lav]||'Ushbu lavozim'} uchun eng muhim sifat nima?`,v:["A) Tezlik","B) Sifat va mijozga e'tibor","C) Arzonlik","D) Ko'p gapirish"],t:"B"},
    {s:"Ish joyini tozalash qachon amalga oshiriladi?",v:["A) Faqat hafta oxirida","B) Faqat menejor ko'rsa","C) Har kuni smena boshida va oxirida","D) Ehtiyoj bo'lganda"],t:"C"},
    {s:"Mijoz shikoyat qilsa nima qilasiz?",v:["A) E'tibor bermayman","B) Bahslashaman","C) Tinglayman va muammoni hal qilaman","D) Menejerga yuboraman"],t:"C"},
    {s:"Yangi mahsulot haqida ma'lumot qanday olinadi?",v:["A) Mijozdan so'rayman","B) Taxmin qilaman","C) Ahamiyati yo'q","D) Trening va menyu o'rganish orqali"],t:"D"},
    {s:"Kafe reputatsiyasi uchun eng muhim omil nima?",v:["A) Narx","B) Joy","C) Sifatli mahsulot va a'lo xizmat","D) Bezatish"],t:"C"}
  ];
}

let tqs=[],tq=0,tsc=0,tans=false;
function startTest(){
  const dar=document.getElementById('daraja').value;
  tqs=getQuestions(curLav,dar); tq=0; tsc=0;
  document.getElementById('testSetup').style.display='none';
  document.getElementById('testArea').style.display='block';
  document.getElementById('testRes').style.display='none';
  document.getElementById('qcard').style.display='block';
  showQ();
}
function showQ(){
  if(tq>=tqs.length){showRes();return;}
  const q=tqs[tq]; tans=false;
  document.getElementById('qnum').textContent=`Savol ${tq+1} / ${tqs.length}`;
  document.getElementById('qtxt').textContent=q.s;
  document.getElementById('pfill').style.width=Math.round((tq/tqs.length)*100)+'%';
  const o=document.getElementById('qopts'); o.innerHTML='';
  q.v.forEach((v,i)=>{
    const b=document.createElement('button');
    b.className='opt'; b.textContent=v;
    b.onclick=()=>chk(i,b,q);
    o.appendChild(b);
  });
}
function chk(idx,btn,q){
  if(tans)return; tans=true;
  const L=['A','B','C','D'],cor=q.t.toUpperCase();
  document.querySelectorAll('.opt').forEach((b,i)=>{
    if(L[i]===cor)b.classList.add('ok');
    else if(b===btn)b.classList.add('no');
    b.style.cursor='default';
  });
  if(L[idx]===cor)tsc++;
  setTimeout(()=>{tq++;showQ();},1200);
}
function showRes(){
  document.getElementById('qcard').style.display='none';
  document.getElementById('pfill').style.width='100%';
  const pct=Math.round((tsc/tqs.length)*100);
  const st=pct>=80?'QABUL':pct>=60?'SHARTLI':'RAD ETISH';
  document.getElementById('resBadge').textContent=st;
  document.getElementById('resBadge').className='badge '+(pct>=80?'ok':pct>=60?'mid':'no');
  document.getElementById('resRows').innerHTML=`
    <div class="rrow"><span class="rk">To'g'ri javoblar</span><span class="rv">${tsc} / ${tqs.length}</span></div>
    <div class="rrow"><span class="rk">Ball</span><span class="rv">${pct}%</span></div>
    <div class="rrow"><span class="rk">Natija</span><span class="rv">${st}</span></div>
    <div class="rrow"><span class="rk">Tavsiya</span><span class="rv">${pct>=80?'Suhbatga taklif etiladi':pct>=60?"Qo'shimcha mashq tavsiya etiladi":'Tajriba orttiring va qayta keling'}</span></div>`;
  document.getElementById('testRes').style.display='block';
  document.getElementById('improveBtn').style.display=pct<70?'block':'none';
}
function resetTest(){
  document.getElementById('testSetup').style.display='block';
  document.getElementById('testArea').style.display='none';
}

botMsg(QSCRIPT[0].q);
document.getElementById('quickRow').style.display='flex';
